<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImperiumHook · Webhook Spammer</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #030305;
      --bg-surface: rgba(12, 14, 18, 0.85);
      --text-primary: #f0f0fa;
      --text-muted: #b0b0c8;
      --red-core: #ff1a1a;
      --radius-xl: 24px;
      --border: rgba(255, 255, 255, 0.08);
      --discord-bg: #2b2d31;
      --mention-bg: rgba(88, 101, 242, 0.3);
      --mention-text: #c9cdfb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 20px; }

    /* BACKGROUND */
    .bg-layers { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-grad { position: absolute; inset: 0; background: radial-gradient(1200px 700px at 10% 10%, rgba(255, 26, 26, 0.1) 0%, transparent 70%), #050508; }
    .grid-lines { position: absolute; inset: 0; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(circle at center, black, transparent 80%); }
    #canvas { position: fixed; inset: 0; z-index: 1; opacity: 0.5; }

    /* NOTIFICATIONS SYSTEM */
    #notif-container { 
        position: fixed; top: 20px; right: 20px; 
        display: flex; flex-direction: column; gap: 10px; 
        z-index: 10000; pointer-events: none;
    }
    .notif { 
        min-width: 280px; max-width: 350px; background: rgba(10, 10, 12, 0.95); 
        border: 1px solid var(--border); border-left: 4px solid var(--red-core); 
        padding: 16px; border-radius: 8px; color: white; font-size: 0.8rem;
        backdrop-filter: blur(10px); cursor: pointer; pointer-events: auto;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        transition: transform 0.3s, opacity 0.3s;
    }
    .notif.rate-limit { border-left-color: #ffaa00; }
    .notif.hide { animation: slideOut 0.3s ease forwards; }
    
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

    /* MAIN PANEL */
    .main-panel { position: relative; z-index: 10; width: 100%; max-width: 1150px; background: var(--bg-surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 35px; display: grid; grid-template-columns: 1fr 400px; gap: 30px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }

    h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; text-transform: uppercase; }
    .red { color: var(--red-core); text-shadow: 0 0 15px rgba(255, 26, 26, 0.4); }

    .input-group { margin-bottom: 15px; position: relative; }
    label { display: block; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1.5px; }
    input, textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-family: 'JetBrains Mono', monospace; outline: none; transition: 0.2s; }
    input:focus, textarea:focus { border-color: var(--red-core); background: rgba(255,26,26,0.03); }
    
    /* Zwiększona wysokość textarea dla wiadomości */
    textarea#msg {
        height: 160px;
        resize: vertical;
        min-height: 120px;
        max-height: 120px;
    }

    .webhook-input-container { position: relative; display: flex; align-items: center; }
    .toggle-pass { 
        position: absolute; right: 15px; width: 12px; height: 12px; 
        background: var(--red-core); border-radius: 50%; cursor: pointer; 
        box-shadow: 0 0 10px var(--red-core); transition: 0.3s;
    }
    .toggle-pass.active { background: #fff; box-shadow: 0 0 15px #fff; }

    /* DISCORD PREVIEW - Z DODANYM SCROLLEM I STAŁĄ WYSOKOŚCIĄ */
    .discord-preview { 
        background: var(--discord-bg); 
        border-radius: 8px; 
        padding: 14px; 
        display: flex; 
        gap: 14px; 
        margin-bottom: 20px; 
        border: 1px solid rgba(0,0,0,0.3);
        max-height: 95px;
        overflow-y: auto;
        overflow-x: hidden; /* Zablokowanie poziomego scrolla */
        transition: max-height 0.2s ease;
    }
    
    /* Styl scrollbara dla preview */
    .discord-preview::-webkit-scrollbar {
        width: 6px;
    }
    
    .discord-preview::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
    }
    
    .discord-preview::-webkit-scrollbar-thumb {
        background: var(--red-core);
        border-radius: 10px;
    }
    
    .discord-preview::-webkit-scrollbar-thumb:hover {
        background: #ff4d4d;
    }
    
    .preview-avatar { 
        width: 42px; 
        height: 42px; 
        border-radius: 50%; 
        object-fit: cover; 
        background: #1e1f22; 
        flex-shrink: 0;
        position: sticky;
        top: 0;
    }
    
    .preview-content {
        flex: 1;
        min-width: 0; /* Ważne - pozwala na zawijanie tekstu */
    }
    
    .preview-header { 
        display: flex; 
        align-items: center; 
        gap: 6px; 
        margin-bottom: 2px;
        position: sticky;
        top: 0;
        background: var(--discord-bg);
        padding: 4px 0;
        z-index: 2;
        flex-wrap: wrap; /* Zawijanie nagłówka jeśli potrzeba */
    }
    
    .preview-name { 
        font-weight: 500; 
        color: #fff; 
        font-size: 1rem;
        word-break: break-word; /* Zawijanie długich nazw */
    }
    
    .preview-tag { 
        background: #5865F2; 
        color: #fff; 
        font-size: 0.6rem; 
        padding: 1px 4px; 
        border-radius: 3px; 
        font-weight: 600;
        flex-shrink: 0;
    }
    
    .preview-time { 
        color: #949ba4; 
        font-size: 0.7rem;
        flex-shrink: 0;
    }
    
    .preview-text { 
        color: #dbdee1; 
        font-size: 0.95rem; 
        line-height: 1.375rem; 
        white-space: pre-wrap; /* Zawijanie białych znaków */
        word-wrap: break-word; /* Zawijanie długich słów */
        word-break: break-word; /* Dodatkowe zabezpieczenie dla długich ciągów */
        overflow-wrap: break-word; /* Nowoczesne zawijanie */
        max-width: 100%; /* Nie wychodzi poza kontener */
        padding-right: 5px;
    }
    
    .mention { 
        background: var(--mention-bg); 
        color: var(--mention-text); 
        border-radius: 3px; 
        padding: 0 2px; 
        font-weight: 500;
        word-break: break-word; /* Zawijanie wewnątrz mention */
    }
    
    .preview-text b { 
        font-weight: 700; 
        color: #fff;
        word-break: break-word;
    }
    
    .preview-text code { 
        background: #1e1f22; 
        padding: 2px 4px; 
        border-radius: 4px; 
        font-family: 'JetBrains Mono', monospace;
        word-break: break-word; /* Zawijanie w kodzie */
        white-space: pre-wrap; /* Zawijanie w preformatowanym tekście */
    }

    .action-row { display: flex; gap: 10px; margin-top: 8px; height: 55px; }
    
    .action-container {
        margin-top: 30px;
    }
    
    .btn-exec { margin-left: 15px;flex-grow: 1; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--red-core), #800000); color: white; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
    .btn-stop { width: 0; opacity: 0; overflow: hidden; border-radius: 12px; border: 2px solid var(--red-core); color: var(--red-core); font-weight: 900; cursor: pointer; transition: 0.4s; background: transparent; }
    
    .running .btn-exec { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    .running .btn-stop { width: 120px; opacity: 1; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .info-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 12px; }
    .info-card .val { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; display: block; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .delete-hook-btn {
      width: 100%;
      height: 60px;
      background: linear-gradient(135deg, #2a0000 0%, #1a0000 100%);
      border: 1px solid rgba(255, 26, 26, 0.3);
      border-radius: 16px;
      color: #ff4d4d;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 20px -10px rgba(255, 0, 0, 0.2);
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .delete-hook-btn:hover {
      background: linear-gradient(135deg, #3d0000 0%, #260000 100%);
      border-color: rgba(255, 26, 26, 0.8);
      box-shadow: 0 0 25px rgba(255, 26, 26, 0.3);
      color: #ff6666;
      transform: translateY(-2px);
      letter-spacing: 3px;
    }

    .delete-hook-btn:active {
      transform: translateY(2px);
      box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
    }

    .delete-hook-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 26, 26, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .delete-hook-btn:hover::before {
      left: 100%;
    }

    .delete-hook-btn i {
      font-size: 18px;
      filter: drop-shadow(0 0 8px rgba(255, 26, 26, 0.5));
      transition: transform 0.3s ease;
    }

    .delete-hook-btn:hover i {
      transform: rotate(90deg) scale(1.2);
    }

    .delete-hook-btn:hover span {
      animation: glitch 0.3s ease infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); }
      100% { transform: translate(0); }
    }

    /* Styl dla wyboru pliku PFP */
    .pfp-compact { 
        background: rgba(255,26,26,0.03); 
        border: 1px solid rgba(255,26,26,0.2); 
        border-radius: 15px; 
        padding: 15px; 
        margin-bottom: 20px; 
    }
    
    .pfp-container {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-top: 8px;
        min-height: 70px;
    }
    
    .pfp-circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.3);
        border: 2px solid var(--red-core);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
        box-shadow: 0 0 15px rgba(255, 26, 26, 0.2);
    }
    
    .pfp-placeholder {
        color: var(--red-core);
        font-size: 24px;
        opacity: 0.7;
        filter: drop-shadow(0 0 5px rgba(255, 26, 26, 0.5));
    }
    
    .pfp-preview {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
    }
    
    .pfp-preview.show {
        display: block;
    }
    
    .pfp-preview.show + .pfp-placeholder {
        display: none;
    }
    
    .pfp-btns { 
        display: flex; 
        gap: 10px; 
        align-items: center; 
        flex: 1;
    }
    
    .pfp-btns > div { 
        flex: 1;
        background: rgba(0,0,0,0.3); 
        padding: 12px 10px; 
        border-radius: 8px; 
        font-size: 0.65rem; 
        font-weight: 700;
        text-align: center; 
        cursor: pointer; 
        border: 1px solid var(--border);
        transition: 0.2s;
        white-space: nowrap;
        letter-spacing: 1px;
    }
    
    .pfp-btns > div:hover {
        background: rgba(255,26,26,0.1);
        border-color: var(--red-core);
    }
    
    #pfpUp { 
        background: var(--red-core); 
        color: white; 
        border: none; 
        padding: 12px 15px; 
        border-radius: 8px; 
        font-weight: 800; 
        cursor: pointer; 
        display: none;
        transition: 0.2s;
        white-space: nowrap;
        font-size: 0.65rem;
        letter-spacing: 1px;
    }
    
    #pfpUp:hover {
        background: #ff4d4d;
        transform: scale(1.05);
    }
    
    #pfpUp.show {
        display: inline-block;
    }

    @media (max-width: 1000px) { 
        .main-panel { 
            grid-template-columns: 1fr; 
            height: 95vh; 
            overflow-y: auto; 
        }
        
        .pfp-container {
            flex-direction: row;
            flex-wrap: wrap;
        }
        
        .pfp-circle {
            width: 50px;
            height: 50px;
        }
    }
  </style>
</head>
<body>

  <div class="bg-layers"><div class="bg-grad"></div><div class="grid-lines"></div></div>
  <canvas id="canvas"></canvas>
  <div id="notif-container"></div>

  <div class="main-panel">
    <div class="left-side">
      <h1>Webhook <span class="red">Control Panel</span></h1>
      
      <div class="input-group">
        <label>Endpoint URL</label>
        <div class="webhook-input-container">
            <input type="password" id="url" placeholder="https://discord.com/api/webhooks/..." oninput="checkStatus()">
            <div class="toggle-pass" onclick="toggleWebhook()"></div>
        </div>
      </div>

      <label>Discord Message Preview</label>
      <div class="discord-preview">
          <img id="prevAvatar" class="preview-avatar" src="https://cdn.discordapp.com/embed/avatars/0.png">
          <div class="preview-content">
              <div class="preview-header">
                  <span id="prevName" class="preview-name">Webhook</span>
                  <span class="preview-tag">Bot</span>
                  <span id="prevTime" class="preview-time">Dzisiaj o 12:00</span>
              </div>
              <div id="prevText" class="preview-text"></div>
          </div>
      </div>

      <div class="input-group">
        <label>Message Content</label>
        <textarea id="msg" placeholder="message"></textarea>
      </div>

      <div class="action-container">
          <div class="input-group" style="margin-bottom: 8px;">
              <label>Sending Delay (ms)</label>
              <input type="number" id="delay" value="110" min="20">
          </div>
          <div class="action-row" id="actionRow">
            <button class="btn-exec" id="execBtn" onclick="startSpam()">Zacznij Wysyłanie</button>
            <button class="btn-stop" id="stopBtn" onclick="stopSpam()">STOP</button>
          </div>
      </div>
    </div>

    <div class="right-side">
      <label>Technical Details</label>
      <div class="info-grid">
          <div class="info-card"><label>Status</label><span class="val" id="stDot" style="color:#555">● Offline</span></div>
          <div class="info-card"><label>Type</label><span class="val" id="stType">---</span></div>
          <div class="info-card" style="grid-column: span 2;"><label>Channel ID</label><span class="val" id="stChan">---</span></div>
          <div class="info-card" style="grid-column: span 2;"><label>Guild ID</label><span class="val" id="stGuild">---</span></div>
      </div>

      <div class="input-group">
        <label>Quick Actions</label>
        <input type="text" id="newName" placeholder="Zmień nazwę na..." style="margin-bottom: 8px;">
        <button style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; border-radius:8px; cursor:pointer; font-size:0.7rem; font-weight:800; text-transform:uppercase;" onclick="rename()">ZAPISZ NOWY NICK</button>
      </div>

      <div class="pfp-compact">
          <label>Profile Picture</label>
          <div class="pfp-container">
              <div class="pfp-circle">
                  <img id="pfpPreview" class="pfp-preview" src="#" alt="Podgląd">
                  <span class="pfp-placeholder"></span>
              </div>
              
              <div class="pfp-btns">
                  <div onclick="document.getElementById('pfpIn').click()">WYBIERZ PLIK</div>
                  <input type="file" id="pfpIn" hidden accept="image/*">
                  <button id="pfpUp" onclick="uploadPFP()">WGRAJ</button>
              </div>
          </div>
      </div>

      <button class="delete-hook-btn" onclick="deleteHook()">
          <span>USUŃ WEBHOOK</span>
      </button>
    </div>
  </div>

  <script>
    let isRunning = false, shouldStop = false, b64 = "";

    function notify(text, type = 'normal') {
      const container = document.getElementById('notif-container');
      const el = document.createElement('div');
      el.className = `notif ${type === 'rate' ? 'rate-limit' : ''}`;
      el.innerHTML = `<strong>${type === 'rate' ? 'RATE LIMIT' : 'SYSTEM'}</strong><br>${text}`;
      
      const remove = () => {
          el.classList.add('hide');
          setTimeout(() => el.remove(), 300);
      };

      el.onclick = remove;
      container.appendChild(el);
      setTimeout(remove, 5000);
    }

    function toggleWebhook() {
        const input = document.getElementById('url');
        const dot = document.querySelector('.toggle-pass');
        input.type = input.type === "password" ? "text" : "password";
        dot.classList.toggle('active');
    }

    function parseMarkdown(text) {
        if(!text) return "";
        return text
            .replace(/@everyone/g, '<span class="mention">@everyone</span>')
            .replace(/@here/g, '<span class="mention">@here</span>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/`(.*?)`/g, '<code>$1</code>');
    }

    function updatePreview() {
        const raw = document.getElementById('msg').value;
        const previewText = document.getElementById('prevText');
        previewText.innerHTML = parseMarkdown(raw) || "Twoja wiadomość...";
    }

    async function checkStatus() {
      const url = document.getElementById('url').value;
      if(!url.includes("api/webhooks/")) return;
      try {
        const res = await fetch(url);
        if(res.ok) {
          const d = await res.json();
          document.getElementById('stDot').innerText = "● Online";
          document.getElementById('stDot').style.color = "#00ff88";
          document.getElementById('stChan').innerText = d.channel_id;
          document.getElementById('stGuild').innerText = d.guild_id || "DM / Unknown";
          document.getElementById('stType').innerText = d.type == 1 ? "Incoming" : "Follower";
          document.getElementById('prevName').innerText = d.name || "Webhook";
          if(d.avatar) {
              document.getElementById('prevAvatar').src = `https://cdn.discordapp.com/avatars/${d.id}/${d.avatar}.png`;
          }
        }
      } catch(e) {}
    }

    async function startSpam() {
      const url = document.getElementById('url').value;
      const content = document.getElementById('msg').value;
      const delay = parseInt(document.getElementById('delay').value);
      if(!url || !content) return notify("Brak danych do wysyłki!");

      isRunning = true; shouldStop = false;
      document.getElementById('actionRow').classList.add('running');
      notify("Sekwencja uruchomiona...");

      while(!shouldStop) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: content})
          });
          
          if(res.status === 429) {
            const r = await res.json();
            const wait = Math.ceil(r.retry_after);
            notify(`Rate Limit! Czekam ${wait}s...`, 'rate');
            await new Promise(s => setTimeout(s, r.retry_after * 1000));
            continue;
          }
          if(!res.ok) {
              notify("Błąd krytyczny połączenia.");
              break;
          }
        } catch(e) { break; }
        await new Promise(r => setTimeout(r, delay));
      }
      document.getElementById('actionRow').classList.remove('running');
      notify("Sekwencja zatrzymana.");
    }

    function stopSpam() { shouldStop = true; }

    async function deleteHook() {
      if(!confirm("⚠️ UWAGA! To usunięcie webhooka jest nieodwracalne! ⚠️")) return;
      const url = document.getElementById('url').value;
      const res = await fetch(url, { method: 'DELETE' });
      if(res.ok) { 
        notify("💀 Webhook usunięty permanentnie.", 'normal'); 
        setTimeout(() => location.reload(), 2000); 
      }
    }

    function rename() {
        const url = document.getElementById('url').value;
        const newName = document.getElementById('newName').value;
        if(!url || !newName) return notify("Brak nazwy lub URL!");
        fetch(url, { 
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: newName})
        }).then(r => {
            if(r.ok) {
                notify("Nazwa zmieniona!");
                document.getElementById('prevName').innerText = newName;
            }
            else notify("Błąd zmiany nazwy!");
        });
    }

    document.getElementById('pfpIn').onchange = function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('pfpPreview');
                preview.src = e.target.result;
                preview.classList.add('show');
                
                document.getElementById('prevAvatar').src = e.target.result;
                document.getElementById('pfpUp').classList.add('show');
                
                b64 = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    };

    function uploadPFP() {
        const url = document.getElementById('url').value;
        if(!url) return notify("Najpierw podaj URL webhooka!");
        if(!b64) return notify("Najpierw wybierz plik!");
        
        fetch(url, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({avatar: b64})
        }).then(r => {
            if(r.ok) {
                notify("Avatar zmieniony!");
            } else {
                notify("Błąd zmiany avatara!");
            }
        });
    }

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let w, h, pts = [];
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<60; i++) pts.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5});
    function draw() {
      ctx.clearRect(0,0,w,h);
      pts.forEach((p,i) => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
        ctx.fillStyle='rgba(255,50,50,0.3)'; ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,7); ctx.fill();
        for(let j=i+1; j<pts.length; j++){
          let d = Math.hypot(p.x-pts[j].x, p.y-pts[j].y);
          if(d<120){ ctx.strokeStyle=`rgba(255,50,50,${0.1*(1-d/120)})`; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
    setInterval(checkStatus, 5000);
  </script>
</body>
</html>
