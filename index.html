<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>WEBHOOK EXECUTOR - ULTRA GLOW EDITION</title>
    <style>
        /* BASE SETUP */
        :root {
            --bg: #050505;
            --panel: #0a0a0a;
            --accent: #00f2ff; /* Cyjanowy Glow */
            --danger: #ff003c; /* Czerwony Glow */
            --success: #00ff62; /* Zielony Glow */
            --text: #ffffff;
            --border: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            border-radius: 0 !important; /* TOTALNY BRAK ZAOKRĄGLEŃ */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* CONTAINER & GLOW */
        .main-container {
            width: 600px;
            background: var(--panel);
            border: 2px solid var(--border);
            padding: 40px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 1);
            z-index: 1;
        }

        .main-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: var(--accent);
            z-index: -1;
            filter: blur(15px);
            opacity: 0.15;
            transition: 0.3s;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        /* INPUTS */
        .input-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--accent);
            outline: none;
            transition: 0.2s;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        /* BUTTONS */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        .btn-delete { border-color: var(--danger); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: #000; box-shadow: 0 0 20px var(--danger); }

        .btn-full { grid-column: span 2; margin-top: 10px; background: rgba(0, 242, 255, 0.05); }

        /* NOTIFICATIONS */
        #notif-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .notification {
            background: #000;
            border-left: 4px solid var(--accent);
            color: #fff;
            padding: 15px 25px;
            margin-bottom: 10px;
            min-width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out forwards;
            font-size: 12px;
            text-transform: uppercase;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* STATUS DOT */
        .status-bar {
            margin-top: 20px;
            font-size: 10px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #status-indicator {
            width: 8px;
            height: 8px;
            background: #333;
        }
        .online { background: var(--success) !important; box-shadow: 0 0 8px var(--success); }
        .offline { background: var(--danger) !important; box-shadow: 0 0 8px var(--danger); }

    </style>
</head>
<body>

    <div id="notif-container"></div>

    <div class="main-container">
        <h1>Webhook Executor</h1>
        
        <div class="input-group">
            <label>Endpoint URL</label>
            <input type="text" id="url" placeholder="https://discord.com/api/webhooks/...">
        </div>

        <div class="input-group">
            <label>Webhook Identity (Nick)</label>
            <input type="text" id="username" placeholder="SpoconaPachaAdrian12">
        </div>

        <div class="input-group">
            <label>Message Payload</label>
            <textarea id="message" rows="3" placeholder="POW POW!"></textarea>
        </div>

        <div class="btn-grid">
            <div class="input-group">
                <label>Count</label>
                <input type="number" id="count" value="999999999999">
            </div>
            <div class="input-group">
                <label>Delay (ms)</label>
                <input type="number" id="delay" value="75">
            </div>
        </div>

        <div class="btn-grid">
            <button onclick="startSpam()">Execute Spam</button>
            <button class="btn-delete" onclick="deleteWebhook()">Self Destruct</button>
            <button class="btn-full" onclick="manualCheck()">Manual Status Check</button>
        </div>

        <div class="status-bar">
            <div id="status-indicator"></div>
            <span id="status-text">SYSTEM STANDBY</span>
        </div>
    </div>

<script>
    const notifContainer = document.getElementById('notif-container');
    const statusInd = document.getElementById('status-indicator');
    const statusTxt = document.getElementById('status-text');

    function notify(msg, type = 'accent') {
        const div = document.createElement('div');
        div.className = 'notification';
        if(type === 'danger') div.style.borderColor = 'var(--danger)';
        if(type === 'success') div.style.borderColor = 'var(--success)';
        
        div.innerText = `> ${msg}`;
        notifContainer.appendChild(div);
        
        setTimeout(() => {
            div.style.opacity = '0';
            setTimeout(() => div.remove(), 500);
        }, 3000);
    }

    async function checkWebhookStatus(silent = false) {
        const url = document.getElementById('url').value;
        if(!url) return;

        try {
            const res = await fetch(url);
            if(res.ok) {
                statusInd.className = 'online';
                statusTxt.innerText = "WEBHOOK ONLINE - READY FOR TRAFFIC";
                if(!silent) notify("STATUS: ONLINE", "success");
            } else {
                statusInd.className = 'offline';
                statusTxt.innerText = "WEBHOOK OFFLINE - INVALID URL";
                if(!silent) notify("STATUS: OFFLINE", "danger");
            }
        } catch(e) {
            statusInd.className = 'offline';
            if(!silent) notify("CONNECTION ERROR", "danger");
        }
    }

    // Auto-check co 5 sekund
    setInterval(() => {
        if(document.getElementById('url').value) {
            checkWebhookStatus(true);
        }
    }, 5000);

    async function manualCheck() {
        await checkWebhookStatus(false);
    }

    async function deleteWebhook() {
        const url = document.getElementById('url').value;
        if(!url) return notify("URL REQUIRED", "danger");

        if(confirm("DELETE WEBHOOK PERMANENTLY?")) {
            const res = await fetch(url, { method: 'DELETE' });
            if(res.status === 204) {
                notify("WEBHOOK DESTROYED", "danger");
                statusInd.className = 'offline';
            } else {
                notify("DELETE FAILED", "danger");
            }
        }
    }

    async function startSpam() {
        const url = document.getElementById('url').value;
        const msg = document.getElementById('message').value;
        const username = document.getElementById('username').value;
        const count = parseInt(document.getElementById('count').value);
        const delay = parseInt(document.getElementById('delay').value);

        if(!url || !msg) return notify("MISSING PARAMETERS", "danger");

        notify(`STARTING SEQUENCE: ${count} MSG`, "accent");

        for(let i = 0; i < count; i++) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: msg, username: username })
                });

                if(res.status === 429) {
                    const data = await res.json();
                    notify(`RATE LIMITED: WAIT ${data.retry_after}s`, "danger");
                    await new Promise(r => setTimeout(r, data.retry_after * 1000));
                    i--;
                    continue;
                }

                if(res.ok) {
                    console.log(`Sent ${i+1}`);
                }
            } catch(e) {
                notify("EXECUTION ERROR", "danger");
                break;
            }
            await new Promise(r => setTimeout(r, delay));
        }
        notify("SEQUENCE COMPLETE", "success");
    }
</script>
</body>
</html>
